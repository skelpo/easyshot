<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Viewfinder / camera frame -->
  <!-- Top-left corner -->
  <path d="M152 144 H184" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M152 144 V176" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Top-right corner -->
  <path d="M360 144 H328" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M360 144 V176" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Bottom-left corner -->
  <path d="M152 336 H184" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M152 336 V304" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Bottom-right corner -->
  <path d="M360 336 H328" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M360 336 V304" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Floating thumbnail card (tilted slightly) -->
  <g transform="translate(256, 260) rotate(-6) translate(-256, -260)">
    <rect x="196" y="200" width="120" height="90" rx="8" ry="8" fill="white" opacity="0.95"/>
    <!-- Landscape image placeholder lines -->
    <rect x="204" y="208" width="104" height="60" rx="4" ry="4" fill="#6C5CE7" opacity="0.2"/>
    <!-- Mountain scene inside thumbnail -->
    <polygon points="208,260 230,232 248,252 264,228 300,260" fill="#6C5CE7" opacity="0.4"/>
  </g>

  <!-- Second floating thumbnail (smaller, behind) -->
  <g transform="translate(280, 230) rotate(4) translate(-280, -230)">
    <rect x="262" y="180" width="80" height="60" rx="6" ry="6" fill="white" opacity="0.5"/>
  </g>

  <!-- Cursor arrow at bottom-right of thumbnails -->
  <g transform="translate(318, 310)">
    <polygon points="0,0 0,24 7,19 12,30 17,28 12,17 20,14" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- "Easy" lightning bolt accent -->
  <polygon points="246,370 262,370 256,390 272,390 244,420 250,398 236,398" fill="white" opacity="0.85"/>
</svg>
